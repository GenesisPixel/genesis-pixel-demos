<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>GenesisPixel | Demos</title>
		<link rel="shortcut icon" href="img/favicon.png">
		<link rel="stylesheet" type="text/css" href="css/base.css" />
		<link rel="stylesheet" href="https://use.typekit.net/gmc0vlm.css">
		<style>
			:root { --chapter-color: #FFC555; }
			.hero__line, .hero__text-line, .card__line, .card__progress { background: var(--chapter-color) !important; }
			.hero__text-line, .card__line, .card__progress-fill { background: rgba(255, 197, 85, 0.4) !important; }
			.chapters__btn--active { background: var(--chapter-color) !important; }
		</style>
	</head>
	<body>
		<nav class="navbar">
			<img src="img/stars.svg" class="navbar__icon" alt="">
			<div class="navbar__lines">
				<span class="navbar__line navbar__line--active" style="width:200px"></span>
				<span class="navbar__line" style="width:120px"></span>
				<span class="navbar__line" style="width:80px"></span>
				<span class="navbar__line" style="width:160px"></span>
				<span class="navbar__line" style="width:60px"></span>
			</div>
		</nav>
		<main>
			<div class="hero">
				<div class="hero__header">
					<div class="hero__header-content">
						<span class="hero__line"></span>
						<div class="hero__face-row">
							<img src="img/face.jpg" alt="" class="hero__face">
							<p class="hero__name">Sebastian Vasquez</p>
						</div>
						<div class="hero__svgs">
							<img src="img/svg-8.png" class="hero__svg" alt="" width="32" height="32">
							<img src="img/svg-9.png" class="hero__svg" alt="" width="32" height="32">
							<img src="img/svg-10.png" class="hero__svg" alt="" width="32" height="32">
							<img src="img/svg-11.png" class="hero__svg" alt="" width="32" height="32">
						</div>
						<h1 class="title">Shaders</h1>
					</div>
				</div>
				<div class="hero__text-lines">
					<div class="hero__text-col">
						<div class="hero__text-row">
							<img src="img/svg-1.png" class="icon hero__text-icon" alt="" width="24" height="24">
							<h2></h2>
						</div>
						<p></p>
					</div>
					<span class="hero__divider"></span>
					<div class="hero__text-col">
						<div class="hero__text-row">
							<img src="img/svg-2.png" class="icon hero__text-icon" alt="" width="24" height="24">
							<h2></h2>
						</div>
						<p></p>
						<h3></h3>
						<p></p>
					</div>
					<span class="hero__divider"></span>
					<div class="hero__text-col">
						<div class="hero__text-row">
							<img src="img/svg-3.png" class="icon hero__text-icon" alt="" width="24" height="24">
							<h2></h2>
						</div>
						<p></p>
						<h3></h3>
						<p></p>
						<p></p>
					</div>
				</div>
			</div>
		</main>
		<nav class="chapters">
			<a href="chapter1.html" class="chapters__btn">1</a>
			<a href="chapter2.html" class="chapters__btn">2</a>
			<a href="chapter3.html" class="chapters__btn">3</a>
			<a href="chapter4.html" class="chapters__btn">4</a>
			<a href="chapter5.html" class="chapters__btn">5</a>
			<a href="chapter6.html" class="chapters__btn chapters__btn--active">6</a>
		</nav>
	</body>
</html>
